<div class="feed-container">
  @if (carregando) {
    <div class="feed-loading">
      <p>A carregar publicações...</p>
    </div>
  }

  @if (erro) {
    <div class="feed-erro">
      <p>{{ erro }}</p>
    </div>
  }

  <div class="feed-list">
    @for (pub of publicacoes; track pub.id) {
      <app-post
        [publicacao]="pub"
        (addComment)="handleAddComment($event)"
        (deleted)="removerPublicacao($event)"
      ></app-post>
    }
  </div>

  @if (!carregando && temMais) {
    <button class="load-more" (click)="carregarMais()">Carregar mais</button>
  }
</div>
