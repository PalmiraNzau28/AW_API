<div class="modal-overlay" (click)="closeModal.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Criar nova publicação</h2>
      <button class="icon-btn" (click)="closeModal.emit()">
        <lucide-icon [img]="XIcon" [size]="24"></lucide-icon>
      </button>
    </div>

    <div class="modal-body">
      @if (!selectedPreview) {
        <div class="empty-state">
          <lucide-icon [img]="ImageIcon" [size]="72" class="empty-icon"></lucide-icon>
          <p class="empty-text">Escreva, selecione uma imagem ou um vídeo</p>
          <textarea
            placeholder="Escreva uma publicação..."
            [(ngModel)]="texto"
            rows="5"
            class="caption-input standalone"
          ></textarea>
          <label class="select-btn">
            <input type="file" accept="image/*,video/*" (change)="handleMediaSelect($event)" hidden />
            Selecionar media
          </label>
          @if (erro) {
            <p class="erro-msg">{{ erro }}</p>
          }
        </div>
      } @else {
        <div class="preview-grid">
          <div class="preview-image-wrap">
            @if (selectedMediaType === 'video') {
              <video [src]="selectedPreview" class="preview-image" controls></video>
            } @else {
              <img [src]="selectedPreview" alt="Preview" class="preview-image" />
            }
          </div>
          <div class="caption-area">
            <textarea
              placeholder="Escreva uma publicação..."
              [(ngModel)]="texto"
              rows="8"
              class="caption-input"
            ></textarea>
            <div class="char-count">{{ texto.length }}/2200</div>
            @if (erro) {
              <p class="erro-msg">{{ erro }}</p>
            }
          </div>
        </div>
      }
    </div>

    @if (selectedPreview || texto.trim()) {
      <div class="modal-footer">
        <button class="share-btn" (click)="handleSubmit()" [disabled]="enviando">
          {{ enviando ? 'A publicar...' : 'Partilhar' }}
        </button>
      </div>
    }
  </div>
</div>
