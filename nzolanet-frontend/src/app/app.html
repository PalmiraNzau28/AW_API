@if (!autenticado) {
  <app-auth (authenticated)="onAuthenticated()"></app-auth>
} @else {
  <div class="app-root">
    <app-sidebar
      [currentView]="currentView"
      (viewChange)="currentView = $event"
      (createPost)="showCreatePost = true"
      (logout)="logout()"
    ></app-sidebar>

    <main class="app-main">
      @if (currentView === 'feed') {
        <app-feed [reloadTrigger]="feedReloadTrigger"></app-feed>
      }
      @if (currentView === 'search') {
        <app-search></app-search>
      }
      @if (currentView === 'notifications') {
        <app-notifications></app-notifications>
      }
      @if (currentView === 'profile') {
        <app-profile></app-profile>
      }
    </main>

    @if (showCreatePost) {
      <app-create-post
        (closeModal)="showCreatePost = false"
        (publicacaoCriada)="onPublicacaoCriada()"
      ></app-create-post>
    }
  </div>
}
